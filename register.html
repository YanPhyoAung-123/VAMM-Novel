<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Account ဖွင့်ရန်</title>
   <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .auth-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .link { text-align: center; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>Account ဖွင့်ရန်</h2>
    <input type="email" id="reg-email" placeholder="Email (ဥပမာ- vamm@gmail.com)">
    <input type="password" id="reg-password" placeholder="Password (အနည်းဆုံး ၆ လုံး)">
    <button id="register-btn">အကောင့်ဖွင့်မည်</button>
    <div class="link">အကောင့်ရှိပြီးသားလား? <a href="login.html">login ဝင်ရန်</a></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC7wLKQiacs-hdgY1OTgKXX6UnKNW_NibU",
        authDomain: "webnovel-195.firebaseapp.com",
        projectId: "webnovel-195",
        storageBucket: "webnovel-195.firebasestorage.app",
        messagingSenderId: "355249228773",
        appId: "1:355249228773:web:4ccda859de48a98dcdfd0c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app); // app ကို အရင် initialize လုပ်ပြီးမှ db ကို သတ်မှတ်ရပါမယ်

    document.getElementById('register-btn').addEventListener('click', async () => {
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;

        if(!email || !password) return alert("ဖြည့်စွက်ပေးပါ");

        try {
            // ၁။ အကောင့် အရင်ဆောက်မယ်
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // ၂။ Database ထဲမှာ Coin ၁၀ ခု တစ်ခါတည်း သတ်မှတ်မယ်
            await setDoc(doc(db, "users", user.uid), {
                email: email,
                coins: 10,           // လက်ဆောင်ပေးသည့် ပမာဏ
                purchasedChapters: [], // ဝယ်ထားသည့် အခန်းများစာရင်း
                createdAt: new Date()
            });

            alert("အကောင့်ဖွင့်ခြင်း အောင်မြင်ပါသည်။ Coin 10 ခု လက်ဆောင်ရရှိပါသည်!");
            window.location.href = "index.html"; 

        } catch (error) {
            alert("အမှားရှိနေပါသည်: " + error.message);
        }
    });
</script>

<script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
</body>
</html>
