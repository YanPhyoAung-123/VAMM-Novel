<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support & Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .support-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .main-title {
            color: #444; /* အမဲကို နည်းနည်းလျော့ထားသော အရောင် */
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .sub-title {
            color: #666; /* အမဲဖျော့ဖျော့ */
            font-size: 16px;
            margin-top: 30px;
            margin-bottom: 20px;
        }
        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: #000;
            border: 2px solid #000; /* အမဲရောင်ဘောင် */
            padding: 12px;
            border-radius: 12px; /* ဒေါင့်ဝိုင်းဝိုင်းလေး */
            font-weight: bold;
            transition: 0.3s;
            margin-bottom: 15px;
        }
        .btn-link:hover {
            background-color: #eee;
        }
        .telegram-icon {
            font-size: 24px;
            color: #000; /* အဖြူအမဲ Logo ဖြစ်အောင် အမဲရောင်ပေးထားသည် */
        }
    </style>
</head>
<body>

    <div class="support-card">
        <div class="main-title">Telegram သို့တိုက်ရိုက်ဆက်သွယ်နိုင်ပါသည်။</div>

        <a href="https://t.me/vam258088" target="_blank" class="btn-link">
            <i class="fab fa-telegram telegram-icon"></i>
            <span>Telegram Channel</span>
        </a>

        <div class="sub-title">ဝတ္ထုတင်ခြင်သူများ ဆက်သွယ်ရန်။</div>

        <a href="https://t.me/Vamm195" target="_blank" class="btn-link">
            <i class="fab fa-telegram telegram-icon"></i>
            <span>Admin Acc</span>
        </a>
        
        <br>
        <button onclick="history.back()" style="border:none; background:none; color:#888; cursor:pointer;">← နောက်သို့ပြန်သွားရန်</button>
    </div>

</body>
</html>
