<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h2 { border-bottom: 2px solid #28a745; padding-bottom: 10px; margin-top: 0; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 5px 2px; }
        .btn-novel { background: #007bff; color: white; width: 100%; }
        .btn-chapter { background: #28a745; color: white; width: 100%; }
        .btn-search { background: #6c757d; color: white; width: auto; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-edit { background: #ffc107; color: #000; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f8f9fa; }
        .user-info { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #dee2e6; display: none; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 90%; max-width: 600px; border-radius: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="border: 2px solid #007bff;">
        <h2>၁။ စာဖတ်သူများအား Coin ထည့်ပေးရန်</h2>
        <label>စာဖတ်သူ၏ Email</label>
        <div style="display: flex; gap: 10px;">
            <input type="email" id="u-email" placeholder="example@gmail.com">
            <button class="btn-search" id="searchUserBtn">အကောင့်ရှာမည်</button>
        </div>
        <div id="user-info-section" class="user-info">
            <p>အမည်: <span id="display-name" style="font-weight: bold;">-</span></p>
            <p>လက်ရှိ Coin: <span id="display-coins" style="color: #b8860b; font-weight: bold;">0</span></p>
            <hr>
            <label>ထည့်ပေးမည့် Coin ပမာဏ</label>
            <input type="number" id="add-coin-amount" placeholder="၅၀၀">
            <button class="btn-chapter" id="updateCoinBtn">Coin ထည့်မည်</button>
        </div>
    </div>

    <div class="card">
        <h2>၂။ ဝတ္ထုစာစဉ်အသစ် တင်ရန်</h2>
        <input type="text" id="n-image" placeholder="ကာဗာပုံ URL">
        <input type="text" id="n-title" placeholder="ဝတ္ထုနာမည်">
        <input type="text" id="n-translator" placeholder="ဘာသာပြန်သူ">
        <input type="text" id="n-genre" placeholder="အမျိုးအစား">
        <textarea id="n-summary" rows="3" placeholder="အကျဉ်းချုပ်"></textarea>
        <button class="btn-novel" id="addNovelBtn">ဝတ္ထုအသစ် သိမ်းမည်</button>
    </div>

    <div class="card">
        <h2>၃။ အခန်းအသစ် (Chapter) တင်ရန်</h2>
        <select id="novelSelect"><option value="">-- ဝတ္ထုရွေးပါ --</option></select>
        <input type="number" id="c-no" placeholder="အခန်းနံပါတ်">
        <input type="text" id="c-title" placeholder="အခန်းခေါင်းစဉ်">
        <input type="number" id="c-coin" value="0" placeholder="Coin">
        <textarea id="c-content" rows="10" placeholder="ဝတ္ထုစာသားများ"></textarea>
        <button class="btn-chapter" id="addChapterBtn">အခန်းတင်မည်</button>
    </div>

    <div class="card" style="border: 2px solid #28a745;">
        <h2>၄။ စာစဉ်အလိုက် Coin ရရှိမှု</h2>
        <table>
            <thead>
                <tr><th>ဝတ္ထုအမည်</th><th>Coin စုစုပေါင်း</th></tr>
            </thead>
            <tbody id="coinStatsBody"></tbody>
        </table>
        <div style="margin-top: 10px; display: flex; justify-content: space-between;">
            <button class="btn-search" id="prevStatBtn">← အရှေ့</button>
            <button class="btn-search" id="nextStatBtn">အနောက် →</button>
        </div>
    </div>

    <div class="card" style="border: 2px solid #ffc107;">
        <h2>၅။ စာစဉ်နှင့် အခန်းများ စီမံခန့်ခွဲရန်</h2>
        <div id="mgmt-novel-area">
            <table>
                <thead>
                    <tr><th>ဝတ္ထုအမည်</th><th>လုပ်ဆောင်ချက်</th></tr>
                </thead>
                <tbody id="mgmtNovelListBody"></tbody>
            </table>
        </div>
        <div id="mgmt-chapter-area" style="display: none;">
            <button class="btn-search" onclick="window.backToNovels()" style="margin-bottom: 10px;">← နောက်သို့</button>
            <h3 id="current-mgmt-novel-title" style="color: #007bff;"></h3>
            <table>
                <thead>
                    <tr><th>အခန်း</th><th>Coin</th><th>လုပ်ဆောင်ချက်</th></tr>
                </thead>
                <tbody id="mgmtChapterListBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>အခန်းကို ပြင်ဆင်ခြင်း</h3>
        <input type="hidden" id="edit-c-id">
        <label>အခန်းခေါင်းစဉ်</label>
        <input type="text" id="edit-c-title">
        <label>Coin ပမာဏ</label>
        <input type="number" id="edit-c-coin">
        <label>ဝတ္ထုစာသားများ</label>
        <textarea id="edit-c-content" rows="12"></textarea>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn-chapter" id="saveEditBtn" style="flex: 2;">ပြင်ဆင်ချက်များ သိမ်းမည်</button>
            <button class="btn-search" onclick="window.closeModal()" style="flex: 1;">ပိတ်မည်</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, serverTimestamp, query, where, doc, updateDoc, deleteDoc, getDoc, increment, limit, startAfter } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC7wLKQiacs-hdgY1OTgKXX6UnKNW_NibU",
        authDomain: "webnovel-195.firebaseapp.com",
        projectId: "webnovel-195",
        storageBucket: "webnovel-195.firebasestorage.app",
        messagingSenderId: "355249228773",
        appId: "1:355249228773:web:4ccda859de48a98dcdfd0c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentViewingNovelId = null;
    let lastStatDoc = null;

    // --- Search & Coin ---
    document.getElementById('searchUserBtn').onclick = async () => {
        const emailInput = document.getElementById('u-email').value.trim().toLowerCase();
        const q = query(collection(db, "users"), where("email", "==", emailInput));
        const snap = await getDocs(q);
        if (snap.empty) { alert("ရှာမတွေ့ပါ"); return; }
        snap.forEach((userDoc) => {
            document.getElementById('display-name').innerText = userDoc.data().username || userDoc.data().name || "-";
            document.getElementById('display-coins').innerText = userDoc.data().coins || 0;
            document.getElementById('user-info-section').style.display = 'block';
            window.targetUserId = userDoc.id;
        });
    };

    document.getElementById('updateCoinBtn').onclick = async () => {
        if(!window.targetUserId) return;
        const amt = parseInt(document.getElementById('add-coin-amount').value);
        await updateDoc(doc(db, "users", window.targetUserId), { coins: increment(amt) });
        alert("Coin ထည့်ပြီးပါပြီ"); location.reload();
    };

    // --- Novels & Chapters ---
    document.getElementById('addNovelBtn').onclick = async () => {
        const title = document.getElementById('n-title').value;
        if(!title) return alert("နာမည်ထည့်ပါ");
        await addDoc(collection(db, "novels"), { 
            title, image: document.getElementById('n-image').value, 
            translator: document.getElementById('n-translator').value, 
            genre: document.getElementById('n-genre').value, 
            summary: document.getElementById('n-summary').value, 
            createdAt: serverTimestamp(), totalCoins: 0 
        });
        alert("ဝတ္ထုသိမ်းပြီးပါပြီ"); window.updateSelect(); window.fetchMgmtNovels();
    };

    document.getElementById('addChapterBtn').onclick = async () => {
        const nid = document.getElementById('novelSelect').value;
        const cno = parseInt(document.getElementById('c-no').value);
        if(!nid || isNaN(cno)) return alert("အချက်အလက်စစ်ပါ");
        await addDoc(collection(db, "chapters"), { 
            novelId: nid, chapterNo: cno, title: document.getElementById('c-title').value, 
            content: document.getElementById('c-content').value, 
            coinPrice: parseInt(document.getElementById('c-coin').value) || 0, createdAt: serverTimestamp() 
        });
        alert("အခန်းတင်ပြီးပါပြီ");
    };

    // --- Management Functions (Fixed No orderBy) ---
    window.fetchMgmtNovels = async () => {
        const snap = await getDocs(query(collection(db, "novels")));
        const body = document.getElementById('mgmtNovelListBody');
        body.innerHTML = '';
        snap.forEach(d => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td style="color:#007bff; cursor:pointer; text-decoration:underline; font-weight:bold;" onclick="window.loadChaptersForMgmt('${d.id}', '${d.data().title.replace(/'/g, "\\'")}')">${d.data().title}</td>
                <td><button class="btn-danger" onclick="window.deleteNovel('${d.id}')">ဖျက်</button></td>
            `;
            body.appendChild(row);
        });
    };

    window.loadChaptersForMgmt = async (nid, title) => {
        currentViewingNovelId = nid;
        document.getElementById('current-mgmt-novel-title').innerText = title;
        document.getElementById('mgmt-novel-area').style.display = 'none';
        document.getElementById('mgmt-chapter-area').style.display = 'block';

        const q = query(collection(db, "chapters"), where("novelId", "==", nid));
        const snap = await getDocs(q);
        const body = document.getElementById('mgmtChapterListBody');
        body.innerHTML = '';
        snap.forEach(d => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>အခန်း ${d.data().chapterNo} - ${d.data().title}</td>
                <td>🪙 ${d.data().coinPrice}</td>
                <td>
                    <button class="btn-edit" onclick="window.openEditModal('${d.id}')">ပြင်</button>
                    <button class="btn-danger" onclick="window.deleteChapter('${d.id}', '${nid}', '${title}')">ဖျက်</button>
                </td>
            `;
            body.appendChild(row);
        });
    };

    // --- Coin Stats Function ---
    window.fetchCoinStats = async (isNext = true) => {
        let q = query(collection(db, "novels"), limit(10));
        if (isNext && lastStatDoc) {
            q = query(collection(db, "novels"), startAfter(lastStatDoc), limit(10));
        }
        const snap = await getDocs(q);
        if (snap.empty) return;
        const body = document.getElementById('coinStatsBody');
        body.innerHTML = '';
        lastStatDoc = snap.docs[snap.docs.length - 1];
        snap.forEach(d => {
            body.innerHTML += `<tr><td>${d.data().title}</td><td style="font-weight:bold; color:#28a745;">🪙 ${d.data().totalCoins || 0}</td></tr>`;
        });
    };

    window.openEditModal = async (cid) => {
        const snap = await getDoc(doc(db, "chapters", cid));
        if(snap.exists()) {
            const data = snap.data();
            document.getElementById('edit-c-id').value = cid;
            document.getElementById('edit-c-title').value = data.title;
            document.getElementById('edit-c-coin').value = data.coinPrice;
            document.getElementById('edit-c-content').value = data.content;
            document.getElementById('editModal').style.display = 'block';
        }
    };

    document.getElementById('saveEditBtn').onclick = async () => {
        const cid = document.getElementById('edit-c-id').value;
        await updateDoc(doc(db, "chapters", cid), {
            title: document.getElementById('edit-c-title').value,
            coinPrice: parseInt(document.getElementById('edit-c-coin').value),
            content: document.getElementById('edit-c-content').value
        });
        alert("ပြင်ပြီးပါပြီ"); window.closeModal();
        window.loadChaptersForMgmt(currentViewingNovelId, document.getElementById('current-mgmt-novel-title').innerText);
    };

    window.deleteNovel = async (nid) => {
        if(confirm("ဖျက်မှာလား?")) { await deleteDoc(doc(db, "novels", nid)); window.fetchMgmtNovels(); }
    };

    window.deleteChapter = async (cid, nid, title) => {
        if(confirm("ဖျက်မှာလား?")) { await deleteDoc(doc(db, "chapters", cid)); window.loadChaptersForMgmt(nid, title); }
    };

    window.closeModal = () => document.getElementById('editModal').style.display = 'none';
    window.backToNovels = () => {
        document.getElementById('mgmt-novel-area').style.display = 'block';
        document.getElementById('mgmt-chapter-area').style.display = 'none';
    };

    window.updateSelect = async () => {
        const s = document.getElementById('novelSelect');
        const snap = await getDocs(collection(db, "novels"));
        s.innerHTML = '<option value="">-- ဝတ္ထုရွေးပါ --</option>';
        snap.forEach(d => s.innerHTML += `<option value="${d.id}">${d.data().title}</option>`);
    };

    document.getElementById('nextStatBtn').onclick = () => window.fetchCoinStats(true);
    document.getElementById('prevStatBtn').onclick = () => location.reload();

    // Start
    window.updateSelect();
    window.fetchMgmtNovels();
    window.fetchCoinStats();
</script>
</body>
</html>
