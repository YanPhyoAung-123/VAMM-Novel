<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Coins - VAMM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f4f4f4; color: #333; }
        header { background: #222; color: white; text-align: center; padding: 18px; font-size: 20px; font-weight: bold; letter-spacing: 2px; }
        .balance-box { background: white; text-align: center; padding: 18px; border-bottom: 1px solid #eee; }
        .balance-box h2 { font-size: 18px; margin-bottom: 6px; }
        .coins { font-size: 24px; font-weight: bold; color: #b8860b; }
        .section-title { text-align: center; font-size: 20px; font-weight: bold; padding: 20px 16px 10px; }
        .packages-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px 16px; }
        .pkg-card { background: white; border-radius: 12px; padding: 18px 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.07); cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .pkg-card.selected { border-color: #28a745; background: #f0fff4; }
        .pkg-card .coin-icon { font-size: 28px; }
        .pkg-card .coin-amount { font-size: 20px; font-weight: bold; color: #b8860b; margin: 6px 0 4px; }
        .pkg-card .price { font-size: 15px; color: #555; }
        .pay-section { background: white; margin: 0 16px 16px; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
        .pay-section h3 { font-size: 16px; font-weight: bold; margin-bottom: 12px; }
        .pay-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .pay-btn { padding: 14px; border-radius: 10px; border: 2px solid #ddd; background: white; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; color: #333; }
        .pay-btn.selected { border-color: #28a745; background: #f0fff4; }
        .qr-section { display: none; background: white; margin: 0 16px 16px; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); text-align: center; }
        .qr-section img { width: 200px; height: 200px; object-fit: contain; border-radius: 6px; margin: 8px auto; display: block; border: 2px solid #eee; }
        .qr-name { font-size: 17px; font-weight: bold; margin-top: 10px; color: #222; }
        .qr-phone { font-size: 15px; color: #555; margin-top: 4px; }
        .notes-box { background: white; margin: 0 16px 16px; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
        .notes-box label { font-weight: bold; display: block; margin-bottom: 8px; }
        .notes-box textarea { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; resize: none; }
        .submit-btn { display: block; width: calc(100% - 32px); margin: 0 16px 30px; padding: 16px; background: linear-gradient(135deg, #28a745, #20863a); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(40,167,69,0.3); }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
        .toast { display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: white; padding: 14px 24px; border-radius: 30px; font-size: 14px; font-weight: bold; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.2); width: 90%; text-align: center; }
    </style>
</head>

<header>VAMM</header>

<div class="balance-box">
    <h2>Coin ဝယ်ယူရန်</h2>
    <div class="coins">🪙 သင့်လက်ကျန် Coin: <span id="balance-display">...</span></div>
</div>

<div class="section-title">Coin Package များ</div>

<div class="packages-grid">

        <div class="price">၅၀၀ ကျပ်</div>
    </div>
    <div class="pkg-card" onclick="selectPackage(this, 1010, 1000)">

        <div class="price">၁၀၀၀ ကျပ်</div>
    </div>
    <div class="pkg-card" onclick="selectPackage(this, 2030, 2000)">
        <div class="coin-icon">🪙</div>
        <div class="coin-amount">2000<span style="font-size:13px;color:#28a745;">(+30)</span></div>
        <div class="price">၂၀၀၀ ကျပ်</div>
    </div>
    <div class="pkg-card" onclick="selectPackage(this, 4050, 4000)">
        <div class="coin-icon">🪙</div>
        <div class="coin-amount">4000<span style="font-size:13px;color:#28a745;">(+50)</span></div>
        <div class="price">၄၀၀၀ ကျပ်</div>
    </div>
    <div class="pkg-card" onclick="selectPackage(this, 5200, 5000)">

        <div class="coin-amount">5000<span style="font-size:13px;color:#28a745;">(+200)</span></div>
        <div class="price">၅၀၀၀ ကျပ်</div>
    </div>
    <div class="pkg-card" onclick="selectPackage(this, 11000, 10000)">
        <div class="coin-icon">🪙</div>
        <div class="coin-amount">10000<span style="font-size:13px;color:#28a745;">(+1000)</span></div>
        <div class="price">၁၀၀၀၀ ကျပ်</div>
    </div>
</div>

<div class="pay-section">
    <h3>💳 Payment Method ရွေးပါ</h3>
    <div class="pay-methods">
        <button class="pay-btn" id="btn-kbz" onclick="selectMethod('kbz')">🏦 KBZPAY</button>
        <button class="pay-btn" id="btn-wave" onclick="selectMethod('wave')">💛 WAVEPAY</button>
    </div>
</div>

<div class="qr-section" id="qr-section">
    <p style="color:#888; font-size:14px;" id="qr-label"></p>
    <img id="qr-img" src="" alt="QR Code">
    <div class="qr-name" id="qr-name"></div>
    <div class="qr-phone" id="qr-phone"></div>
</div>

<div class="notes-box">
    <label>📝 မှတ်ချက် (Transaction ID ထည့်နိုင်သည်)</label>
    <textarea id="notes" rows="3" placeholder="မှတ်ချက်ရေးမည်"></textarea>
</div>

<button class="submit-btn" id="submit-btn" onclick="submitRequest()">🪙 Coins Request ပေးပို့မည်</button>

<div class="toast" id="toast"></div>
