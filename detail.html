<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Detail</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; transition: background 0.3s; }
        body.dark-mode { background-color: #121212; color: #e0e0e0; }
        body.dark-mode .detail-container, body.dark-mode .summary-box, body.dark-mode .chapter-list, body.dark-mode .pagination-container, body.dark-mode .navigation-controls, body.dark-mode #chapter-content { background-color: #1e1e1e !important; color: #e0e0e0 !important; }
        body.dark-mode .detail-title, body.dark-mode .info-value, body.dark-mode h4 { color: #ffffff !important; }
        body.dark-mode .chapter-item { background: #2a2a2a; border-color: #333; color: #ccc; }
        body.dark-mode .info-label { color: #888; }
        body.dark-mode .page-btn { background: #2a2a2a; border-color: #444; color: #eee; }
        header { background: #333; color: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .home-link { text-decoration: none; color: white; display: flex; align-items: center; gap: 5px; font-size: 16px; font-weight: bold; }
        .theme-toggle { cursor: pointer; font-size: 20px; user-select: none; }
        body, #chapter-content { -webkit-user-select: none; -ms-user-select: none; user-select: none; }
        .detail-container { display: flex; flex-direction: column; align-items: center; padding: 30px 20px; background: white; }
        .detail-img { width: 210px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); margin-bottom: 25px; }
        .detail-title { font-size: 28px; font-weight: 900; color: #000; text-align: center; margin-bottom: 25px; line-height: 1.4; padding: 0 10px; }
        .info-list { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .info-item { display: flex; flex-direction: column; text-align: left; }
        .info-label { font-size: 14px; color: #888; margin-bottom: 2px; }
        .info-value { font-size: 17px; font-weight: 600; color: #333; }
        .status-badge { background: #e3f2fd; color: #1976d2; padding: 4px 12px; border-radius: 6px; font-size: 14px; font-weight: bold; width: fit-content; }
        .pagination-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; padding: 20px; background: white; }
        .page-btn { padding: 8px 15px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .active-page { padding: 8px 15px; background: #28a745; color: white; border: 1px solid #28a745; border-radius: 4px; font-weight: bold; }
        .summary-box { padding: 25px; background: white; margin-top: 10px; line-height: 1.7; border-top: 1px solid #eee; }
        .chapter-list { padding: 20px; background: white; }
        .chapter-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #fff; margin-bottom: 8px; text-decoration: none; color: #333; border-radius: 8px; border: 1px solid #eee; border-left: 5px solid #28a745; transition: 0.2s; cursor: pointer; }
        .chapter-item:hover { background: #f9f9f9; }
        .coin-tag { background: #fff3cd; padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; color: #856404; border: 1px solid #ffeeba; }
        .nav-btn { padding: 10px 20px; border: none; border-radius: 5px; background: #28a745; color: white; cursor: pointer; }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .navigation-controls { display: flex; justify-content: center; gap: 10px; padding: 20px; background: white; border-top: 1px solid #eee; }
        #loading-msg { text-align: center; padding: 40px; font-size: 16px; color: #888; }
    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <a href="index.html" class="home-link"><span>🏠</span> Home</a>
        <div id="theme-icon" class="theme-toggle" onclick="toggleTheme()">☀️</div>
    </header>

    <div id="loading-msg">Loading...</div>
    <div id="novel-header-container"></div>
    <div id="chapter-content" style="padding: 20px; line-height: 1.8; font-size: 19px; background: white; display:none;"></div>
    <div class="navigation-controls" id="nav-container" style="display: none;">
        <button id="prevBtn" class="nav-btn">ရှေ့တစ်ခန်း</button>
        <button id="indexBtn" class="nav-btn" style="background:#6c757d;">မာတိကာ</button>
        <button id="nextBtn" class="nav-btn">နောက်တစ်ခန်း</button>
    </div>
    <div class="summary-box" id="summary-section" style="display:none;">
        <h4 style="margin-top:0;">အကျဉ်းချုပ်</h4>
        <p id="novel-summary" style="color:#555;"></p>
    </div>
    <div id="chapters-container" class="chapter-list"></div>
    <div id="pagination-container" class="pagination-container"></div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('theme-icon');
            if (body.classList.contains('dark-mode')) { body.classList.remove('dark-mode'); themeIcon.innerText = '☀️'; localStorage.setItem('theme', 'light'); }
            else { body.classList.add('dark-mode'); themeIcon.innerText = '🌚'; localStorage.setItem('theme', 'dark'); }
        }
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-mode'); document.getElementById('theme-icon').innerText = '🌚'; }
        });
        document.onkeydown = function(e) { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85) || (e.ctrlKey && e.keyCode == 83) || (e.ctrlKey && e.keyCode == 67)) { return false; } };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7wLKQiacs-hdgY1OTgKXX6UnKNW_NibU",
            authDomain: "webnovel-195.firebaseapp.com",
            projectId: "webnovel-195",
            storageBucket: "webnovel-195.firebasestorage.app",
            messagingSenderId: "355249228773",
            appId: "1:355249228773:web:4ccda859de48a98dcdfd0c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const novelId = urlParams.get('id');         // novel page အတွက်
        const novelIdForChapter = urlParams.get('novelId'); // chapter page အတွက်
        const chapterNo = parseInt(urlParams.get('chapterNo')); // chapter number

        const CACHE_DURATION = 24 * 60 * 60 * 1000; // 24 နာရီ

        // ==========================================
        // LRU Cache - ပြည့်ရင် အဟောင်းဆုံး ဖျက်ပြီး အသစ်ထည့်
        // ==========================================
        function safeSetCache(key, timeKey, data) {
            const value = JSON.stringify(data);
            const now = Date.now();
            try {
                localStorage.setItem(key, value);
                localStorage.setItem(timeKey, now);
            } catch (e) {
                // Storage ပြည့်နေရင် novel_parts cache အဟောင်းဆုံး ဖျက်
                const entries = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const k = localStorage.key(i);
                    if (k && k.startsWith('novel_parts_time_')) {
                        entries.push({ timeKey: k, dataKey: k.replace('_time_', '_'), time: parseInt(localStorage.getItem(k) || '0') });
                    }
                }
                // အဟောင်းဆုံးကနေ စီပြီး ဖျက်
                entries.sort((a, b) => a.time - b.time);
                for (const entry of entries) {
                    localStorage.removeItem(entry.dataKey);
                    localStorage.removeItem(entry.timeKey);
                    try {
                        localStorage.setItem(key, value);
                        localStorage.setItem(timeKey, now);
                        break; // အောင်မြင်ရင် ရပ်
                    } catch (e2) {
                        continue; // မရသေးရင် ဆက်ဖျက်
                    }
                }
            }
        }

        // ==========================================
        // novel_parts မှ chapter အားလုံး ရယူသည်
        // ==========================================
        async function getAllChaptersFromParts(nId) {
            const CACHE_KEY = `novel_parts_${nId}`;
            const TIME_KEY = `novel_parts_time_${nId}`;
            const cached = localStorage.getItem(CACHE_KEY);
            const cachedTime = localStorage.getItem(TIME_KEY);
            const now = Date.now();

            if (cached && cachedTime && (now - parseInt(cachedTime) < CACHE_DURATION)) {
                // သုံးတိုင်း time update လုပ် (LRU tracking)
                localStorage.setItem(TIME_KEY, now);
                return JSON.parse(cached);
            }

            // novel_parts collection မှ ဒီ novel နဲ့ ဆိုင်တဲ့ documents အားလုံး ရယူ
            const partsSnap = await getDocs(collection(db, "novel_parts"));
            let allChapters = [];

            partsSnap.forEach(docSnap => {
                const data = docSnap.data();
                // ဒီ novel ရဲ့ parts တွေပဲ ယူ
                if (data.novelId === nId && Array.isArray(data.chapters)) {
                    allChapters = allChapters.concat(data.chapters);
                }
            });

            // chapterNo အစဉ်လိုက် စီ
            allChapters.sort((a, b) => a.chapterNo - b.chapterNo);

            safeSetCache(CACHE_KEY, TIME_KEY, allChapters);

            return allChapters;
        }

        // ==========================================
        // NOVEL DETAIL PAGE (id=NOVEL_ID)
        // ==========================================
        async function loadDetail() {
            if (!novelId) return;

            document.getElementById('loading-msg').style.display = 'block';

            onAuthStateChanged(auth, async (user) => {
                try {
                    const docRef = doc(db, "novels", novelId);
                    const docSnap = await getDoc(docRef);

                    if (!docSnap.exists()) {
                        document.getElementById('loading-msg').innerText = 'Novel မတွေ့ပါ။';
                        return;
                    }

                    const data = docSnap.data();

                    // View count
                    let viewerArray = data.viewers || [];
                    let totalViews = viewerArray.length;
                    if (user && !viewerArray.includes(user.uid)) {
                        await updateDoc(docRef, { viewers: arrayUnion(user.uid) });
                        totalViews += 1;
                    }

                    // User purchased chapters
                    let purchasedList = [];
                    if (user) {
                        const userSnap = await getDoc(doc(db, "users", user.uid));
                        if (userSnap.exists()) { purchasedList = userSnap.data().purchasedChapters || []; }
                    }

                    // Novel header
                    document.getElementById('novel-header-container').innerHTML = `
                        <div class="detail-container">
                            <img src="${data.image}" class="detail-img">
                            <div class="detail-title">${data.title}</div>
                            <div class="info-list">
                                <div class="info-item"><span class="info-label">Translator</span><span class="info-value">${data.translator}</span></div>
                                <div class="info-item"><span class="info-label">Type</span><span class="info-value">${data.genre}</span></div>
                                <div class="info-item"><span class="info-label">Status</span><span class="status-badge">${data.status || 'Ongoing'}</span></div>
                                <div class="info-item"><span class="info-label">Views</span><span class="info-value">👁️ ${totalViews} Views</span></div>
                            </div>
                        </div>`;

                    // Summary - more/less toggle
                    const summaryText = data.summary || '';
                    const summaryLimit = 150;
                    const summaryEl = document.getElementById('novel-summary');
                    if (summaryText.length > summaryLimit) {
                        const shortText = summaryText.slice(0, summaryLimit);
                        let expanded = false;
                        const render = () => {
                            summaryEl.innerHTML = expanded
                                ? summaryText + ` <span id="sum-toggle" style="color:#28a745;cursor:pointer;font-weight:bold;">less ▲</span>`
                                : shortText + `... <span id="sum-toggle" style="color:#28a745;cursor:pointer;font-weight:bold;">more ▼</span>`;
                            document.getElementById('sum-toggle').onclick = () => { expanded = !expanded; render(); };
                        };
                        render();
                    } else {
                        summaryEl.innerText = summaryText;
                    }
                    document.getElementById('summary-section').style.display = 'block';

                    // novel_parts ကနေ chapters ယူ
                    const allChapters = await getAllChaptersFromParts(novelId);

                    // Volume ၂၀ စီ ခွဲ
                    const chaptersPerVolume = 20;
                    const totalVolumes = Math.ceil(allChapters.length / chaptersPerVolume);
                    let chaptersHTML = `<h4 style="padding:0 5px;">အခန်းများ (စုစုပေါင်း ${allChapters.length})</h4>`;

                    for (let vol = 0; vol < totalVolumes; vol++) {
                        const volStart = vol * chaptersPerVolume;
                        const volEnd = Math.min(volStart + chaptersPerVolume, allChapters.length);
                        const volChapters = allChapters.slice(volStart, volEnd);
                        const isOpen = (vol === 0);
                        chaptersHTML += `
                            <div style="margin-bottom:10px;">
                                <div onclick="toggleVolume(${vol})" style="display:flex;justify-content:space-between;align-items:center;padding:12px 15px;background:#28a745;color:white;border-radius:${isOpen ? '8px 8px 0 0' : '8px'};cursor:pointer;font-weight:bold;" id="vol-header-${vol}">
                                    <span>📚 Vol ${vol + 1} &nbsp;(${volStart + 1} - ${volEnd})</span>
                                    <span id="vol-arrow-${vol}">${isOpen ? '▲' : '▼'}</span>
                                </div>
                                <div id="vol-body-${vol}" style="display:${isOpen ? 'block' : 'none'};border:1px solid #ddd;border-top:none;border-radius:0 0 8px 8px;padding:5px;">`;
                        volChapters.forEach(chapter => {
                            const chapterId = chapter.id || `${novelId}_ch${chapter.chapterNo}`;
                            const isBought = purchasedList.includes(chapterId);
                            const price = isBought ? 0 : (chapter.coinPrice || 0);
                            chaptersHTML += `
                                <div class="chapter-item" onclick="window.location.href='detail.html?novelId=${novelId}&chapterNo=${chapter.chapterNo}'">
                                    <span>အခန်း (${chapter.chapterNo}) - ${chapter.title || 'ခေါင်းစဉ်မရှိ'}</span>
                                    <span class="coin-tag">🪙 ${price}</span>
                                </div>`;
                        });
                        chaptersHTML += `</div></div>`;
                    }

                    document.getElementById('chapters-container').innerHTML = chaptersHTML;
                    document.getElementById('loading-msg').style.display = 'none';

                } catch (e) {
                    console.error(e);
                    document.getElementById('loading-msg').innerText = 'Error: ' + e.message;
                }
            });
        }

        // ==========================================
        // CHAPTER CONTENT PAGE (novelId=X&chapterNo=Y)
        // ==========================================
        async function loadChapterContent() {
            if (!novelIdForChapter || !chapterNo) return;

            document.getElementById('loading-msg').style.display = 'block';

            onAuthStateChanged(auth, async (user) => {
                if (!user) {
                    document.getElementById('loading-msg').style.display = 'none';
                    document.getElementById('chapter-content').style.display = 'block';
                    document.getElementById('chapter-content').innerHTML = `
                        <div style="text-align:center; padding:40px;">
                            <h3>ဖတ်ရှုရန် Login အရင်ဝင်ပါ</h3>
                            <a href="login.html" class="nav-btn" style="text-decoration:none; display:inline-block;">Login</a>
                        </div>`;
                    return;
                }

                try {
                    // novel_parts ကနေ chapters အားလုံး ယူ
                    const allChapters = await getAllChaptersFromParts(novelIdForChapter);

                    // chapterNo နဲ့ တိုက်ဆိုင် chapter ရှာ
                    const chapter = allChapters.find(c => c.chapterNo === chapterNo);

                    if (!chapter) {
                        document.getElementById('loading-msg').innerText = 'အခန်း မတွေ့ပါ။';
                        return;
                    }

                    const coinRequired = chapter.coinPrice || 0;
                    const chapterId = chapter.id || `${novelIdForChapter}_ch${chapterNo}`;

                    // User data
                    const userRef = doc(db, "users", user.uid);
                    const userSnap = await getDoc(userRef);
                    const userData = userSnap.data() || { coins: 0, purchasedChapters: [] };
                    const isPurchased = (userData.purchasedChapters || []).includes(chapterId);

                    // Coin check
                    if (coinRequired > 0 && !isPurchased) {
                        const confirmPurchase = confirm(`ဤအခန်းကိုဖတ်ရှုရန် Coin ${coinRequired} နှုတ်ယူပါမည်။`);
                        if (confirmPurchase) {
                            if (userData.coins >= coinRequired) {
                                await updateDoc(userRef, {
                                    coins: userData.coins - coinRequired,
                                    purchasedChapters: arrayUnion(chapterId)
                                });
                                await updateDoc(doc(db, "novels", novelIdForChapter), {
                                    totalCoins: increment(coinRequired)
                                });
                                alert("အောင်မြင်ပါသည်။");
                            } else {
                                alert("Coin မလုံလောက်ပါ။");
                                window.location.href = `detail.html?id=${novelIdForChapter}`;
                                return;
                            }
                        } else {
                            window.location.href = `detail.html?id=${novelIdForChapter}`;
                            return;
                        }
                    }

                    // Chapter content ပြသ
                    document.getElementById('loading-msg').style.display = 'none';
                    document.getElementById('nav-container').style.display = 'flex';
                    document.getElementById('chapters-container').style.display = 'none';
                    document.getElementById('pagination-container').style.display = 'none';
                    document.getElementById('summary-section').style.display = 'none';
                    document.getElementById('novel-header-container').style.display = 'none';
                    document.getElementById('chapter-content').style.display = 'block';
                    document.getElementById('chapter-content').innerHTML = `
                        <h3 style="text-align:center; color:#555;">အခန်း (${chapter.chapterNo})</h3>
                        <h2 style="text-align:center;">${chapter.title || 'ခေါင်းစဉ်မရှိ'}</h2>
                        <hr style="opacity:0.2; margin: 20px 0;">
                        <div style="white-space: pre-wrap;">${chapter.content || 'စာသားမရှိပါ။'}</div>`;

                    // Navigation setup
                    setupNavigation(allChapters, chapterNo);

                } catch (e) {
                    console.error(e);
                    document.getElementById('loading-msg').innerText = 'Error: ' + e.message;
                }
            });
        }

        function setupNavigation(allChapters, currentChapterNo) {
            // မာတိကာ button
            document.getElementById('indexBtn').onclick = () => {
                window.location.href = `detail.html?id=${novelIdForChapter}`;
            };

            // Next chapter
            const nextChapter = allChapters.find(c => c.chapterNo === currentChapterNo + 1);
            if (nextChapter) {
                document.getElementById('nextBtn').disabled = false;
                document.getElementById('nextBtn').onclick = () => {
                    window.location.href = `detail.html?novelId=${novelIdForChapter}&chapterNo=${nextChapter.chapterNo}`;
                };
            } else {
                document.getElementById('nextBtn').disabled = true;
                document.getElementById('nextBtn').innerText = "နောက်ဆုံးခန်း";
            }

            // Prev chapter
            const prevChapter = allChapters.find(c => c.chapterNo === currentChapterNo - 1);
            if (prevChapter) {
                document.getElementById('prevBtn').disabled = false;
                document.getElementById('prevBtn').onclick = () => {
                    window.location.href = `detail.html?novelId=${novelIdForChapter}&chapterNo=${prevChapter.chapterNo}`;
                };
            } else {
                document.getElementById('prevBtn').disabled = true;
            }
        }

        // ==========================================
        // Main Entry Point
        // ==========================================
        if (novelIdForChapter && chapterNo) {
            // Chapter reading mode
            loadChapterContent();
        } else if (novelId) {
            // Novel detail mode
            loadDetail();
        } else {
            document.getElementById('loading-msg').innerText = 'URL မှားနေပါသည်။';
        }

    </script>
    <script>
        // Global function - module script ပြင်ပမှ access လုပ်နိုင်အောင်
        function toggleVolume(vol) {
            const body = document.getElementById('vol-body-' + vol);
            const arrow = document.getElementById('vol-arrow-' + vol);
            const header = document.getElementById('vol-header-' + vol);
            const isOpen = body.style.display !== 'none';
            body.style.display = isOpen ? 'none' : 'block';
            arrow.innerText = isOpen ? '▼' : '▲';
            header.style.borderRadius = isOpen ? '8px' : '8px 8px 0 0';
        }
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
